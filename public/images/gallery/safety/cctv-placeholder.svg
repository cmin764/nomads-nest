<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <style>
    /* Light (default) — spec tokens */
    .icon   { fill: none; stroke: #B8924A; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .dot    { fill: #B8924A; }
    .label  { fill: #6A7D99; font-family: Raleway, system-ui, sans-serif; }

    @media (prefers-color-scheme: dark) {
      /* Dark — spec tokens (gold unchanged) */
      .label  { fill: #7A8EAA; }
    }
  </style>

  <!-- CCTV camera — centred at (400, 272) -->
  <g transform="translate(400, 272)">
    <!-- Camera body -->
    <rect x="-72" y="-32" width="100" height="64" rx="12" class="icon"/>
    <!-- Lens ring -->
    <circle cx="52" cy="0" r="28" class="icon"/>
    <!-- Lens inner -->
    <circle cx="52" cy="0" r="11" class="icon" stroke-dasharray="none"/>
    <!-- Mount arm -->
    <line x1="-32" y1="-32" x2="-32" y2="-58" class="icon"/>
    <!-- Mount base plate -->
    <line x1="-56" y1="-58" x2="-8" y2="-58" class="icon"/>
    <!-- Status LED -->
    <circle cx="-44" cy="0" r="5" class="dot" opacity="0.7"/>
    <!-- IR sensor ring dots -->
    <circle cx="18" cy="-12" r="3.5" class="dot" opacity="0.4"/>
    <circle cx="34" cy="-12" r="3.5" class="dot" opacity="0.4"/>
    <circle cx="18" cy="12"  r="3.5" class="dot" opacity="0.4"/>
    <circle cx="34" cy="12"  r="3.5" class="dot" opacity="0.4"/>
  </g>

  <!-- Divider line -->
  <line x1="356" y1="332" x2="444" y2="332" stroke="#B8924A" stroke-width="1" opacity="0.5"/>

  <!-- Labels -->
  <text x="400" y="368" text-anchor="middle" class="label"
        font-size="11" font-weight="400" letter-spacing="3">EXTERNAL CCTV</text>
  <text x="400" y="392" text-anchor="middle" class="label"
        font-size="12" font-weight="300" opacity="0.55">photo coming soon</text>
</svg>
