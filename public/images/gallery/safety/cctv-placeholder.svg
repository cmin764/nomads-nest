<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#1c1c1e"/>

  <!-- Subtle grid texture -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
  </pattern>
  <rect width="800" height="600" fill="url(#grid)"/>

  <!-- CCTV camera icon (centered) -->
  <g transform="translate(400, 265)">
    <!-- Camera body -->
    <rect x="-64" y="-28" width="90" height="56" rx="10" ry="10" fill="none" stroke="#C9A84C" stroke-width="4"/>
    <!-- Lens circle -->
    <circle cx="48" cy="0" r="24" fill="none" stroke="#C9A84C" stroke-width="4"/>
    <circle cx="48" cy="0" r="10" fill="#C9A84C" opacity="0.35"/>
    <!-- Mount arm -->
    <line x1="-64" y1="-10" x2="-88" y2="-34" stroke="#C9A84C" stroke-width="4" stroke-linecap="round"/>
    <!-- Mount base -->
    <circle cx="-88" cy="-34" r="8" fill="#C9A84C" opacity="0.5"/>
    <!-- IR dots -->
    <circle cx="10" cy="-10" r="3" fill="#C9A84C" opacity="0.5"/>
    <circle cx="24" cy="-10" r="3" fill="#C9A84C" opacity="0.5"/>
    <circle cx="10" cy="10" r="3" fill="#C9A84C" opacity="0.5"/>
    <circle cx="24" cy="10" r="3" fill="#C9A84C" opacity="0.5"/>
  </g>

  <!-- Label text -->
  <text x="400" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#C9A84C" letter-spacing="3" opacity="0.9">EXTERNAL CCTV</text>
  <text x="400" y="396" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#ffffff" letter-spacing="1" opacity="0.45">photo coming soon</text>
</svg>
